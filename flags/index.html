        const INITIAL_PROGRESS = {
            tier: 1,
            items: {},
        };

        const BOX_INTERVALS = [0, 30, 120, 300, 600, 3600]; 

        const TIERS = [
            { id: 1, name: "Beginner", desc: "Global superpowers & famous flags" },
            { id: 2, name: "Intermediate", desc: "Common nations & distinct patterns" },
            { id: 3, name: "Hard", desc: "Tricky tricolors & easily confused flags" },
            { id: 4, name: "Expert", desc: "Obscure nations & tiny islands" }
        ];

        function FlagTrainer() {
            const [progress, setProgress] = useState(INITIAL_PROGRESS);
            const [currentFlag, setCurrentFlag] = useState(null);
            const [inputValue, setInputValue] = useState('');
            const [suggestions, setSuggestions] = useState([]);
            const [feedback, setFeedback] = useState(null);
            const [showAnswer, setShowAnswer] = useState(false);
            const [streak, setStreak] = useState(0);
            const [sessionStats, setSessionStats] = useState({ correct: 0, total: 0 });
            const [isSetupMode, setIsSetupMode] = useState(true);

            const inputRef = useRef(null);

            // Load Progress
            useEffect(() => {
                const saved = localStorage.getItem('flagTrainerProgress');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (parsed && parsed.tier) {
                            setProgress({ ...INITIAL_PROGRESS, ...parsed });
                            setIsSetupMode(false);
                        }
                    } catch (e) {
                        console.error("Failed to load save", e);
                    }
                }
            }, []);

            // Save Progress
            useEffect(() => {
                if (!isSetupMode) {
                    localStorage.setItem('flagTrainerProgress', JSON.stringify(progress));
                }
            }, [progress, isSetupMode]);

            // Load first flag
            useEffect(() => {
                if (!isSetupMode && !currentFlag) {
                    nextFlag();
                }
            }, [isSetupMode, progress.tier]);

            const selectTier = (tierId) => {
                setProgress(prev => ({ ...prev, tier: tierId }));
                setIsSetupMode(false);
                setCurrentFlag(null);
                setStreak(0);
            };

            const resetProgress = () => {
                localStorage.removeItem('flagTrainerProgress');
                setProgress(INITIAL_PROGRESS);
                setSessionStats({ correct: 0, total: 0 });
                setStreak(0);
                setCurrentFlag(null);
                setIsSetupMode(true);
            };

            const getNextFlagCandidate = (currentCode = null) => {
                const now = Date.now();
                
                const activeItems = Object.entries(progress.items).filter(([code, data]) => {
                    const country = COUNTRY_DATA.find(c => c.code === code);
                    return country && country.tier <= progress.tier && code !== currentCode;
                });

                // 1. Due Cards
                const dueItems = activeItems
                    .filter(([_, data]) => data.nextReview <= now)
                    .sort((a, b) => a[1].nextReview - b[1].nextReview);

                if (dueItems.length > 0) {
                    const index = Math.floor(Math.random() * Math.min(dueItems.length, 3));
                    return COUNTRY_DATA.find(c => c.code === dueItems[index][0]);
                }

                // 2. New Cards (from current tier)
                const seenCodes = new Set(Object.keys(progress.items));
                const newCandidates = COUNTRY_DATA.filter(c => 
                    c.tier === progress.tier && 
                    !seenCodes.has(c.code) && 
                    c.code !== currentCode
                );

                if (newCandidates.length > 0) {
                    return newCandidates[Math.floor(Math.random() * newCandidates.length)];
                }

                // 3. Review Ahead
                const reviewCandidates = activeItems.map(([code]) => COUNTRY_DATA.find(c => c.code === code));
                if (reviewCandidates.length > 0) {
                    return reviewCandidates[Math.floor(Math.random() * reviewCandidates.length)];
                }

                // Fallback
                const fallback = COUNTRY_DATA.filter(c => c.tier <= progress.tier);
                return fallback[Math.floor(Math.random() * fallback.length)];
            };

            const nextFlag = () => {
                const next = getNextFlagCandidate(currentFlag?.code);
                setCurrentFlag(next);
                setInputValue('');
                setSuggestions([]);
                setFeedback(null);
                setShowAnswer(false);
                
                setTimeout(() => {
                    if(inputRef.current) inputRef.current.focus();
                }, 50);
            };

            const handleInput = (e) => {
                const value = e.target.value;
                setInputValue(value);
                setFeedback(null);

                if (value.length > 1) {
                    const matches = COUNTRY_DATA
                        .filter(c => {
                        const matchName = c.name.toLowerCase().includes(value.toLowerCase());
                        const matchAlias = c.aliases ? c.aliases.some(a => a.includes(value.toLowerCase())) : false;
                        return matchName || matchAlias;
                        })
                        .slice(0, 5);
                    setSuggestions(matches);
                } else {
                    setSuggestions([]);
                }
            };

            const selectSuggestion = (name) => {
                setInputValue(name);
                setSuggestions([]);
                submitAnswer(name);
            };

            const submitAnswer = (answerOverride = null) => {
                if (showAnswer || feedback) {
                    nextFlag();
                    return;
                }

                const answer = answerOverride || inputValue;
                if (!answer.trim()) return;

                const isCorrect = 
                    answer.toLowerCase() === currentFlag.name.toLowerCase() || 
                    (currentFlag.aliases && currentFlag.aliases.includes(answer.toLowerCase()));

                const now = Date.now();
                const currentItem = progress.items[currentFlag.code] || { box: 0, nextReview: 0 };
                let newBox = currentItem.box;

                if (isCorrect) {
                    setFeedback('correct');
                    setStreak(s => s + 1);
                    setSessionStats(s => ({ correct: s.correct + 1, total: s.total + 1 }));
                    newBox = Math.min(newBox + 1, BOX_INTERVALS.length - 1);
                } else {
                    setFeedback('wrong');
                    setShowAnswer(true);
                    setStreak(0);
                    setSessionStats(s => ({ ...s, total: s.total + 1 }));
                    newBox = 0;
                }

                const nextReview = now + (BOX_INTERVALS[newBox] * 1000);

                const updatedItems = {
                    ...progress.items,
                    [currentFlag.code]: {
                        box: newBox,
                        nextReview: nextReview,
                        lastResult: isCorrect ? 'correct' : 'wrong'
                    }
                };

                // Auto Tier Promotion Logic
                let newTier = progress.tier;
                const currentTierFlags = COUNTRY_DATA.filter(c => c.tier === progress.tier);
                if (currentTierFlags.length > 0) {
                    const masteredCount = currentTierFlags.filter(c => {
                        const item = updatedItems[c.code];
                        return item && item.box >= 2;
                    }).length;
                    
                    if ((masteredCount / currentTierFlags.length) >= 0.8) {
                        if (newTier < 4) newTier++;
                    }
                }

                setProgress({
                    tier: newTier,
                    items: updatedItems
                });

                if (isCorrect) {
                    setTimeout(() => nextFlag(), 800);
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    if (feedback === 'correct' || feedback === 'wrong') {
                        nextFlag();
                    } else if (suggestions.length > 0) {
                        selectSuggestion(suggestions[0].name);
                    } else {
                        submitAnswer();
                    }
                }
            };

            // Setup Screen Component
            const SetupScreen = () => (
                <div className="flex flex-col items-center justify-center min-h-[80vh] w-full max-w-lg mx-auto p-6 animate-[fadeIn_0.5s_ease-out]">
                    <div className="bg-indigo-100 p-4 rounded-full mb-6 text-indigo-600">
                        <IconTrophy size={48} />
                    </div>
                    <h1 className="text-3xl font-extrabold text-slate-800 mb-2">Welcome to Flag Trainer</h1>
                    <p className="text-slate-500 text-center mb-8">Select your starting difficulty level. The app will adapt to your skill as you play.</p>
                    
                    <div className="w-full space-y-3">
                        {TIERS.map((tier) => (
                        <button
                            key={tier.id}
                            onClick={() => selectTier(tier.id)}
                            className="w-full text-left p-4 rounded-2xl border-2 border-slate-200 hover:border-indigo-500 hover:bg-indigo-50 transition-all group relative overflow-hidden bg-white shadow-sm"
                        >
                            <div className="flex items-center justify-between relative z-10">
                                <div>
                                    <span className="text-indigo-600 font-bold text-xs uppercase tracking-wider mb-1 block">Tier {tier.id}</span>
                                    <h3 className="font-bold text-slate-800 text-lg">{tier.name}</h3>
                                    <p className="text-slate-500 text-sm mt-1">{tier.desc}</p>
                                </div>
                                <IconChevronRight className="text-slate-300 group-hover:text-indigo-500 transition-colors" />
                            </div>
                        </button>
                        ))}
                    </div>
                </div>
            );

            // Game Screen Component
            const GameScreen = () => {
                const getTierProgress = () => {
                    const currentTierFlags = COUNTRY_DATA.filter(c => c.tier === progress.tier);
                    const total = currentTierFlags.length;
                    const known = currentTierFlags.filter(c => {
                        const item = progress.items[c.code];
                        return item && item.box > 0;
                    }).length;
                    return total === 0 ? 0 : (known / total) * 100;
                };

                if (!currentFlag) return <div className="flex h-screen items-center justify-center text-slate-500">Loading Next Flag...</div>;

                return (
                    <React.Fragment>
                    {/* Top Bar */}
                    <div className="bg-white border-b border-slate-200 px-4 py-3 shadow-sm flex items-center justify-between sticky top-0 z-20">
                        <div className="flex items-center gap-3">
                        <div className="bg-indigo-600 p-1.5 rounded-lg">
                            <IconTrophy size={16} className="text-white" />
                        </div>
                        <div>
                            <h1 className="font-bold text-slate-800 leading-tight">Flag Trainer</h1>
                            <div className="flex items-center gap-2 text-xs text-slate-500 font-medium">
                                <span className="flex items-center gap-1"><IconLock size={10} /> Tier {progress.tier}</span>
                                <span className="w-1 h-1 bg-slate-300 rounded-full"></span>
                                <span>Streak: {streak}</span>
                            </div>
                        </div>
                        </div>
                        
                        <div className="flex items-center gap-4">
                            <div className="hidden sm:flex flex-col items-end">
                                <span className="text-xs font-bold text-indigo-600 uppercase tracking-wider mb-1">Tier Mastery</span>
                                <div className="w-24 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                    <div className="h-full bg-indigo-500 transition-all duration-500" style={{ width: `${getTierProgress()}%` }}></div>
                                </div>
                            </div>
                            <button 
                                onClick={() => setIsSetupMode(true)}
                                className="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-full transition-colors"
                                title="Settings"
                            >
                                <IconSettings size={20} />
                            </button>
                        </div>
                    </div>

                    {/* Main Game Area */}
                    <main className="flex-grow flex flex-col items-center justify-center p-4 w-full max-w-2xl mx-auto animate-[fadeIn_0.5s_ease-out]">
                        
                        <div className="w-full bg-white rounded-3xl shadow-xl border border-slate-100 flex flex-col transition-all duration-300 relative">
                            
                            <div className="relative bg-slate-100 p-8 min-h-[260px] flex items-center justify-center border-b border-slate-100 rounded-t-3xl overflow-hidden">
                                <img 
                                    src={`https://flagcdn.com/w640/${currentFlag.code}.png`}
                                    alt="Flag"
                                    className="h-48 rounded-lg shadow-lg object-contain bg-white"
                                />
                                
                                {feedback && (
                                    <div className={`absolute inset-0 flex items-center justify-center bg-white/80 backdrop-blur-sm transition-opacity duration-200 animate-[fadeIn_0.2s_ease-out]`}>
                                        <div className="text-center transform animate-[zoomIn_0.2s_ease-out]">
                                            {feedback === 'correct' ? (
                                                <React.Fragment>
                                                    <div className="mx-auto bg-green-100 w-16 h-16 rounded-full flex items-center justify-center mb-4">
                                                        <IconCheck size={40} className="text-green-600" strokeWidth={3} />
                                                    </div>
                                                    <h2 className="text-2xl font-bold text-green-700">{currentFlag.name}</h2>
                                                    <p className="text-green-600 font-medium mt-1">Well done!</p>
                                                </React.Fragment>
                                            ) : (
                                                <React.Fragment>
                                                    <div className="mx-auto bg-red-100 w-16 h-16 rounded-full flex items-center justify-center mb-4">
                                                        <IconX size={40} className="text-red-600" strokeWidth={3} />
                                                    </div>
                                                    <h2 className="text-xl font-bold text-slate-800 mb-1">Not quite.</h2>
                                                    <p className="text-slate-500 mb-2">It's the flag of</p>
                                                    <h2 className="text-3xl font-extrabold text-indigo-600">{currentFlag.name}</h2>
                                                    <div className="mt-6 text-xs text-slate-400 font-medium uppercase tracking-widest flex items-center justify-center gap-2">
                                                        Press Enter <IconArrowRight size={12} />
                                                    </div>
                                                </React.Fragment>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="p-6 relative">
                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">
                                    Identify this Country
                                </label>
                                
                                <div className="relative z-20">
                                    <input
                                        ref={inputRef}
                                        type="text"
                                        value={inputValue}
                                        onChange={handleInput}
                                        onKeyDown={handleKeyDown}
                                        disabled={!!feedback}
                                        placeholder="Type country name..."
                                        className={`w-full text-lg p-4 pl-12 rounded-xl border-2 outline-none transition-all font-semibold
                                            ${feedback === 'correct' ? 'border-green-500 bg-green-50 text-green-900' : 
                                            feedback === 'wrong' ? 'border-red-500 bg-red-50 text-red-900' : 
                                            'border-slate-200 bg-slate-50 text-slate-800 focus:border-indigo-500 focus:bg-white focus:shadow-md'
                                            }`}
                                        autoComplete="off"
                                        autoFocus
                                    />
                                    <div className={`absolute left-4 top-1/2 -translate-y-1/2 ${feedback ? 'opacity-0' : 'text-slate-400'}`}>
                                        <IconSearch size={20} />
                                    </div>
                                </div>

                                {suggestions.length > 0 && !feedback && (
                                    <div className="absolute left-6 right-6 top-[5.5rem] bg-white rounded-xl shadow-2xl border border-slate-200 overflow-hidden z-30 divide-y divide-slate-50">
                                        {suggestions.map((country) => (
                                            <button
                                                key={country.code}
                                                onClick={() => selectSuggestion(country.name)}
                                                className="w-full text-left px-4 py-3 hover:bg-indigo-50 text-slate-700 font-medium flex items-center justify-between group transition-colors"
                                            >
                                                <span>{country.name}</span>
                                                <span className="text-xs text-indigo-300 group-hover:text-indigo-500 opacity-0 group-hover:opacity-100 transition-all uppercase font-bold tracking-wider">Select</span>
                                            </button>
                                        ))}
                                    </div>
                                )}
                                
                                <div className="mt-6 flex items-center justify-between text-sm text-slate-400 border-t border-slate-50 pt-4 relative z-10">
                                    <span>Current Session: {sessionStats.correct} / {sessionStats.total}</span>
                                    {feedback === 'wrong' && (
                                        <button onClick={nextFlag} className="text-indigo-600 font-bold hover:underline">Skip</button>
                                    )}
                                </div>
                            </div>
                        </div>

                        {!feedback && inputValue.length === 0 && (
                            <p className="mt-8 text-slate-400 text-sm font-medium animate-pulse">
                                Type the name and press Enter
                            </p>
                        )}
                    </main>
                    </React.Fragment>
                );
            };

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col">
                    {isSetupMode ? (
                        <div className="flex-grow flex flex-col justify-center relative">
                            <div className="absolute top-4 right-4">
                                {Object.keys(progress.items).length > 0 && (
                                    <button 
                                        onClick={resetProgress}
                                        className="flex items-center gap-2 px-4 py-2 text-red-500 bg-red-50 hover:bg-red-100 rounded-lg text-sm font-bold transition-colors"
                                    >
                                        <IconRotateCcw size={16} /> Reset Progress
                                    </button>
                                )}
                            </div>
                            <SetupScreen />
                        </div>
                    ) : (
                        <GameScreen />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FlagTrainer />);
    </script>
</body>
</html>
